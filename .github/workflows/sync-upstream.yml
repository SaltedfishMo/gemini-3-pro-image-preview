name: Sync Upstream

on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork main with upstream/main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response_file=$(mktemp)
          http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/SaltedfishMo/gemini-3-pro-image-preview/merge-upstream \
            -d '{"branch":"main"}')

          echo "HTTP ${http_code}"
          cat "$response_file"

          case "$http_code" in
            200|201|202)
              echo "Upstream sync succeeded or was accepted."
              ;;
            409)
              echo "No sync performed or merge conflict detected. Inspect payload above."
              exit 1
              ;;
            422)
              echo "Validation failed for merge-upstream request. Inspect payload above."
              exit 1
              ;;
            *)
              echo "Unexpected response from merge-upstream API."
              exit 1
              ;;
          esac
